<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Assessment</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f5f7;color:#202124}
.wrapper{padding:40px;max-width:900px;margin:auto}
.card{background:#fff;border-radius:16px;border:1px solid #e5e5ef;box-shadow:0 4px 20px rgba(0,0,0,.05);overflow:hidden}
.header{padding:20px 24px;background:#f7f4ff;border-bottom:1px solid #ece8ff}
h1{margin:0;color:#5b35d5;font-size:28px}
.content{padding:24px;font-size:16px;line-height:1.7}
h2{color:#5b35d5;margin-top:0}
ul{padding-left:22px}
li{margin:10px 0}
</style>
</head>
<body>
<div class="wrapper">
<div class="card">
<div class="header">
<h1>Post Assessment</h1>
</div>

<div class="content">

<h2>Post-Application Assessment</h2>

<ul>
<li>Check whether the applicant accepted an alternative offer</li>
<li>Or accepted a conditional offer subject to a mock assignment</li>
</ul>

</div>

</div>
</div>
</body>
</html>
