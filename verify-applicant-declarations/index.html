<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Applicant Declarations</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f5f7;color:#202124}
.wrapper{padding:40px;max-width:900px;margin:auto}
.card{background:#fff;border-radius:16px;border:1px solid #e5e5ef;box-shadow:0 4px 20px rgba(0,0,0,.05);overflow:hidden}
.header{padding:20px 24px;background:#f7f4ff;border-bottom:1px solid #ece8ff}
h1{margin:0;color:#5b35d5;font-size:28px}
.content{padding:24px;font-size:16px;line-height:1.7}
.btn{
background:#5b35d5;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-size:16px;
margin-top:24px;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="header">
      <h1>Verify Applicant Declarations</h1>
    </div>

    <div class="content">
      <p>Instructions for Verify Applicant Declarations go here.</p>

      <button class="btn" onclick="continueBlueprint()">
        I understand — continue
      </button>
    </div>
  </div>
</div>

<script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>

<script>
ZOHO.embeddedApp.on("PageLoad", function(data) {
    console.log("Blueprint widget loaded", data);
});

ZOHO.embeddedApp.init();

function continueBlueprint() {
    ZOHO.CRM.BLUEPRINT.proceed()
    .then(function(response) {
        console.log("Blueprint proceeded", response);
    })
    .catch(function(error) {
        console.error("Blueprint proceed failed", error);
        alert("Could not continue transition. Check Blueprint requirements.");
    });
}
</script>

</body>
</html>
